<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server App Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .background-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            bottom: -100px;
            right: -100px;
            animation-delay: 7s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 14s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(50px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-30px, 30px) scale(0.9);
            }
        }

        .container {
            max-width: 1200px;
            width: 100%;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(102, 126, 234, 0.5);
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {

            0%,
            100% {
                filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.5));
            }

            50% {
                filter: drop-shadow(0 0 30px rgba(102, 126, 234, 0.8));
            }
        }

        .subtitle {
            color: #b8b8d4;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .server-info {
            text-align: center;
            margin-bottom: 40px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .server-info p {
            color: #a0a0c0;
            font-size: 1rem;
        }

        .server-info .ip {
            color: #667eea;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .app-card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 35px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: 20px;
        }

        .app-card:hover::before {
            opacity: 1;
        }

        .app-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            border-radius: 20px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .app-card:hover::after {
            opacity: 1;
        }

        .app-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow:
                0 20px 60px rgba(102, 126, 234, 0.4),
                0 0 40px rgba(118, 75, 162, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .app-card:active {
            transform: translateY(-8px) scale(1.01);
        }

        .app-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.6));
            transition: transform 0.3s ease;
        }

        .app-card:hover .app-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .app-port {
            color: #b8b8d4;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            opacity: 0.8;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.2);
            }
        }

        footer {
            text-align: center;
            color: #8080a0;
            font-size: 0.9rem;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .apps-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="background-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Server Dashboard</h1>
            <p class="subtitle">APPLICATION LAUNCHER</p>
        </header>

        <div class="server-info">
            <p><span class="status-indicator"></span>Server Online: <span class="ip">10.0.0.181</span></p>
        </div>

        <div class="apps-grid">
            <a href="http://10.0.0.181:19999" class="app-card" target="_blank">
                <div class="app-icon">📊</div>
                <div class="app-title">Netdata</div>
                <div class="app-port">Port: 19999</div>
            </a>
            <a href="http://10.0.0.181:8092" class="app-card" target="_blank">
                <div class="app-icon">🪵</div>
                <div class="app-title">Service Logs</div>
                <div class="app-port">Port: 8092</div>
            </a>
            <a href="http://10.0.0.181:8000" class="app-card" target="_blank">
                <div class="app-icon">📻</div>
                <div class="app-title">Youtube Radio</div>
                <div class="app-port">Port: 8000</div>
            </a>
            <a href="http://10.0.0.181:8081" class="app-card" target="_blank">
                <div class="app-icon">🤖</div>
                <div class="app-title">Trilium AI Web</div>
                <div class="app-port">Port: 8081</div>
            </a>
            <a href="http://10.0.0.181:8801/telemetry/dashboard" class="app-card" target="_blank">
                <div class="app-icon">🎵</div>
                <div class="app-title">Audio Stream Google Home</div>
                <div class="app-port">Port: 8801</div>
            </a>
            <a href="http://10.0.0.181:8080" class="app-card" target="_blank">
                <div class="app-icon">📝</div>
                <div class="app-title">Trilium Web Portal</div>
                <div class="app-port">Port: 8080</div>
            </a>
            <a href="http://10.0.0.181:8083" class="app-card" target="_blank">
                <div class="app-icon">📚</div>
                <div class="app-title">Trilium Study</div>
                <div class="app-port">Port: 8083</div>
            </a>
        </div>

        <footer>
            <p>Mini-PC Server • 10.0.0.181</p>
        </footer>
    </div>
</body>

</html>
